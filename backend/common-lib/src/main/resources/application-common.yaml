spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:creative_saas}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${spring.application.name}-hikari
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${DB_SCHEMA:platform}
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    create-schemas: true
    schemas: ${DB_SCHEMA:platform}
    default-schema: ${DB_SCHEMA:platform}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      repositories:
        enabled: false
  cache:
    type: redis
    redis:
      key-prefix: "creative-saas:${spring.application.name}:"
      use-key-prefix: true
      cache-null-values: false
      time-to-live: ${CACHE_TTL:15m}
  sql:
    init:
      mode: never

server:
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8
      force: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    db:
      enabled: true
    redis:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

platform:
  security:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4300}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: false
    max-age-seconds: 3600
    jwt:
      issuer: ${JWT_ISSUER:creative-saas-platform}
      secret-base64: ${JWT_SECRET_BASE64:Q3JlYXRpdmVTYWFTUGxhdGZvcm1EZXYyMDI2U2lnbmluZ1NlY3JldEJhc2U2NEtleUZvckxvY2FsVXNlT25seQ==}
      access-token-ttl: ${JWT_ACCESS_TTL:15m}
      refresh-token-ttl: ${JWT_REFRESH_TTL:30d}
      invitation-token-ttl: ${JWT_INVITATION_TTL:7d}
      clock-skew: ${JWT_CLOCK_SKEW:30s}
  redis:
    token-namespace: creative-saas:tokens
    rate-limit-namespace: creative-saas:rate-limits
    session-namespace: creative-saas:sessions

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%level service=${spring.application.name:-application} correlationId=%X{correlationId:-} workspaceId=%X{workspaceId:-} thread=%thread logger=%logger{36} message=%msg%n"
  level:
    root: INFO
    com.lebhas.creativesaas: INFO
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:creative_saas}
  jpa:
    show-sql: false

logging:
  level:
    com.lebhas.creativesaas: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}

logging:
  level:
    com.lebhas.creativesaas: DEBUG

---
spring:
  config:
    activate:
      on-profile: staging
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}

logging:
  level:
    com.lebhas.creativesaas: INFO

---
spring:
  config:
    activate:
      on-profile: production
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

logging:
  level:
    root: INFO
    com.lebhas.creativesaas: INFO
    org.springframework.security: WARN
