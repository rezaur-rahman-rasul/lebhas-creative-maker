services:
  postgres:
    image: postgres:16-alpine
    container_name: creative-saas-postgres
    environment:
      POSTGRES_DB: creative_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creative_saas"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: creative-saas-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ../..
      dockerfile: backend/docker/Dockerfile.service
      args:
        SERVICE_NAME: auth-service
    image: creative-saas/auth-service:0.1.0
    container_name: creative-saas-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8081
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: creative_saas
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health/readiness > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  workspace-service:
    build:
      context: ../..
      dockerfile: backend/docker/Dockerfile.service
      args:
        SERVICE_NAME: workspace-service
    image: creative-saas/workspace-service:0.1.0
    container_name: creative-saas-workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8083
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: creative_saas
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health/readiness > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  creative-service:
    build:
      context: ../..
      dockerfile: backend/docker/Dockerfile.service
      args:
        SERVICE_NAME: creative-service
    image: creative-saas/creative-service:0.1.0
    container_name: creative-saas-creative
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8084
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: creative_saas
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOCAL_STORAGE_ROOT: /app/storage
      LOCAL_STORAGE_BASE_URL: http://localhost:8080
    ports:
      - "8084:8084"
    volumes:
      - creative-storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health/readiness > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  gateway-service:
    build:
      context: ../..
      dockerfile: backend/docker/Dockerfile.service
      args:
        SERVICE_NAME: gateway-service
    image: creative-saas/gateway-service:0.1.0
    container_name: creative-saas-gateway
    depends_on:
      auth-service:
        condition: service_healthy
      workspace-service:
        condition: service_healthy
      creative-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: creative_saas
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_BASE_URL: http://auth-service:8081
      WORKSPACE_SERVICE_BASE_URL: http://workspace-service:8083
      CREATIVE_SERVICE_BASE_URL: http://creative-service:8084
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

volumes:
  postgres-data:
  redis-data:
  creative-storage:
