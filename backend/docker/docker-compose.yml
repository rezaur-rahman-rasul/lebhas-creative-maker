services:
  postgres:
    image: postgres:16-alpine
    container_name: creative-saas-postgres
    environment:
      POSTGRES_DB: creative_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creative_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: creative-saas-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-service:
    build:
      context: ../..
      dockerfile: backend/docker/Dockerfile.service
      args:
        JAR_FILE: backend/gateway-service/target/gateway-service-0.1.0-SNAPSHOT.jar
    image: creative-saas/gateway-service:0.1.0
    container_name: creative-saas-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: creative_saas
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  redis-data:
