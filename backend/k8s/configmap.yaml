apiVersion: v1
kind: ConfigMap
metadata:
  name: creative-saas-config
  labels:
    app.kubernetes.io/name: creative-saas
data:
  SPRING_PROFILES_ACTIVE: "production"
  SERVER_PORT: "8080"
  POSTGRES_HOST: "postgresql.default.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "creative_saas"
  DB_SCHEMA: "platform"
  REDIS_HOST: "redis.default.svc.cluster.local"
  REDIS_PORT: "6379"
  CORS_ALLOWED_ORIGINS: "https://app.example.com"
