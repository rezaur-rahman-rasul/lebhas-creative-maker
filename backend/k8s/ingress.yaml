apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: creative-saas-ingress
  labels:
    app.kubernetes.io/name: creative-saas
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  name: http
