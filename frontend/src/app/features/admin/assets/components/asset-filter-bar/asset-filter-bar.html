<section class="rounded-2xl border border-border bg-white p-4 shadow-sm">
  <div class="flex flex-col gap-4 xl:flex-row xl:items-start xl:justify-between">
    <div class="min-w-0">
      <div class="flex flex-wrap items-center gap-2">
        <h2 class="text-base font-semibold text-ink">Search and filters</h2>
        <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600">
          {{ selectedFolderName() }}
        </span>
      </div>
      <p class="mt-1 text-sm text-muted">
        Narrow the library by file type, category, tag, and status.
      </p>
    </div>

    <div class="flex items-center gap-2 self-start rounded-full border border-border bg-slate-50 p-1">
      <button
        type="button"
        class="inline-flex items-center gap-2 rounded-full px-3 py-2 text-sm font-medium transition"
        [class.bg-white]="viewMode() === 'grid'"
        [class.text-ink]="viewMode() === 'grid'"
        [class.shadow-sm]="viewMode() === 'grid'"
        [class.text-muted]="viewMode() !== 'grid'"
        (click)="viewModeChanged.emit('grid')"
      >
        <app-icon name="grid-2x2" [size]="16" />
        Grid
      </button>

      <button
        type="button"
        class="inline-flex items-center gap-2 rounded-full px-3 py-2 text-sm font-medium transition"
        [class.bg-white]="viewMode() === 'list'"
        [class.text-ink]="viewMode() === 'list'"
        [class.shadow-sm]="viewMode() === 'list'"
        [class.text-muted]="viewMode() !== 'list'"
        (click)="viewModeChanged.emit('list')"
      >
        <app-icon name="list" [size]="16" />
        List
      </button>
    </div>
  </div>

  <form class="mt-4 grid gap-3 lg:grid-cols-2 xl:grid-cols-5" [formGroup]="filterForm" (ngSubmit)="apply()">
    <label class="block xl:col-span-2">
      <span class="mb-2 block text-sm font-medium text-ink">Search</span>
      <span class="relative block">
        <app-icon
          name="search"
          className="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
          [size]="16"
        />
        <input
          type="text"
          formControlName="search"
          data-testid="asset-search"
          placeholder="File name, storage key, tag"
          class="h-11 w-full rounded-lg border border-border bg-white pl-10 pr-3 text-sm text-ink outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
        />
      </span>
    </label>

    <label class="block">
      <span class="mb-2 block text-sm font-medium text-ink">Category</span>
      <select
        formControlName="assetCategory"
        data-testid="asset-category-filter"
        class="h-11 w-full rounded-lg border border-border bg-white px-3 text-sm text-ink outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
      >
        <option value="">All categories</option>
        @for (option of categoryOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </label>

    <label class="block">
      <span class="mb-2 block text-sm font-medium text-ink">File type</span>
      <select
        formControlName="fileType"
        class="h-11 w-full rounded-lg border border-border bg-white px-3 text-sm text-ink outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
      >
        <option value="">All file types</option>
        @for (option of fileTypeOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </label>

    <label class="block">
      <span class="mb-2 block text-sm font-medium text-ink">Status</span>
      <select
        formControlName="status"
        class="h-11 w-full rounded-lg border border-border bg-white px-3 text-sm text-ink outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
      >
        <option value="">All statuses</option>
        @for (option of statusOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </label>

    <label class="block xl:col-span-2">
      <span class="mb-2 block text-sm font-medium text-ink">Tag</span>
      <input
        type="text"
        formControlName="tag"
        placeholder="summer-campaign"
        class="h-11 w-full rounded-lg border border-border bg-white px-3 text-sm text-ink outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
      />
    </label>

    <div class="flex flex-wrap items-end gap-3 xl:col-span-3 xl:justify-end">
      <app-button
        type="button"
        variant="ghost"
        icon="filter"
        [disabled]="disabled()"
        (click)="reset()"
      >
        Reset filters
      </app-button>
      <app-button type="submit" icon="search" [disabled]="disabled()">Apply filters</app-button>
    </div>
  </form>
</section>
