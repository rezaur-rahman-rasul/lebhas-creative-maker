
    <div class="mb-6">
      <div class="flex items-center gap-3">
        <div class="grid h-11 w-11 place-items-center rounded-lg bg-brand-50 text-brand-700">
          <app-icon [name]="icon()" [size]="21" />
        </div>
        <app-badge [tone]="badgeTone()">{{ badgeLabel() }}</app-badge>
      </div>

      <h1 class="mt-4 text-2xl font-semibold text-ink">{{ title() }}</h1>
      <p class="mt-2 text-sm leading-6 text-muted">{{ description() }}</p>
    </div>
