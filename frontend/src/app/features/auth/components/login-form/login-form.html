<section class="w-full">
  <div>
<p class="text-sm font-semibold uppercase tracking-[0.18em] text-brand-700">Lebhas - Brand Attire</p>
    <h2 class="mt-3 text-[2rem] font-semibold leading-tight text-slate-900">Log in to Lebhas</h2>
    <p class="mt-2 text-sm leading-6 text-slate-500">
      Continue to your creative workspace with a verified account session.
    </p>
  </div>

  @if (errorMessage()) {
    <div class="mt-5 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
      {{ errorMessage() }}
    </div>
  }

  <form class="mt-6 flex flex-col gap-4" [formGroup]="form" (ngSubmit)="submit()">
    <label class="block">
      <span class="mb-2 block text-sm font-medium text-ink">Email address</span>
      <input
        appAutofocus
        type="text"
        formControlName="identifier"
        autocomplete="username"
        data-testid="login-identifier"
        placeholder="Email address"
        class="h-12 w-full rounded-xl border border-slate-300 bg-white px-4 text-base text-ink shadow-sm outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-4 focus:ring-brand-100"
      />
      @if (identifierError()) {
        <span class="mt-2 block text-sm text-alert-600">{{ identifierError() }}</span>
      }
    </label>

    <app-password-field
      label="Password"
      placeholder="Password"
      autocomplete="current-password"
      testId="login-password"
      [control]="form.controls.password"
      [submitted]="attemptedSubmit()"
      [externalError]="passwordError()"
    />

    <div class="pt-2">
      <app-button type="submit" [fullWidth]="true" [loading]="loading()" data-testid="login-submit">
        Log in
      </app-button>
    </div>

    <div class="text-left">
      <button
        type="button"
        class="text-sm font-medium text-accent-600 transition hover:text-accent-500"
        (click)="forgotPassword.emit()"
      >
        Forgotten password?
      </button>
    </div>

    <div class="h-px bg-slate-200"></div>

    <a
      routerLink="/register"
      class="flex h-12 items-center justify-center rounded-xl bg-emerald-500 px-5 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-600"
    >
      Create new account
    </a>
  </form>
</section>
