@if (open() && profile()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center px-4 py-6">
    <button
      type="button"
      class="dialog-backdrop absolute inset-0 bg-slate-950/45 backdrop-blur-[2px]"
      aria-label="Close dialog"
      (click)="close()"
    ></button>

    <section
      class="dialog-panel relative w-full max-w-[26rem] rounded-[1.75rem] border border-white/70 bg-white p-6 shadow-[0_28px_90px_rgba(15,23,42,0.18)] sm:p-8"
      role="dialog"
      aria-modal="true"
    >
      <button
        type="button"
        class="absolute right-5 top-5 grid h-9 w-9 place-items-center rounded-full text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
        aria-label="Close dialog"
        (click)="close()"
      >
        <app-icon name="x" [size]="18" />
      </button>

      <div class="flex flex-col items-center text-center">
        <app-avatar [name]="profile()!.name" [avatarUrl]="profile()!.avatarUrl" size="xl" />
        <h3 class="mt-4 text-2xl font-semibold text-slate-900">{{ profile()!.name }}</h3>
        <p class="mt-2 text-sm leading-6 text-slate-500">
          Enter your password to continue to the Lebhas creative workspace.
        </p>
      </div>

      <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
        <app-password-field
          label="Password"
          placeholder="Password"
          autocomplete="current-password"
          [control]="form.controls.password"
          [submitted]="attemptedSubmit()"
          [externalError]="passwordError()"
        />

        <app-button type="submit" [fullWidth]="true" [loading]="loading()">Log in</app-button>

        <div class="text-center">
          <button
            type="button"
            class="text-sm font-medium text-accent-600 transition hover:text-accent-500"
            (click)="forgotPassword.emit()"
          >
            Forgotten password?
          </button>
        </div>
      </form>
    </section>
  </div>
}
