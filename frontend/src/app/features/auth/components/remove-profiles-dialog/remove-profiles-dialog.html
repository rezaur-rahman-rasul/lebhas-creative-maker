@if (open()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center px-4 py-6">
    <button
      type="button"
      class="dialog-backdrop absolute inset-0 bg-slate-950/45 backdrop-blur-[2px]"
      aria-label="Close dialog"
      (click)="closed.emit()"
    ></button>

    <section
      class="dialog-panel relative w-full max-w-[34rem] rounded-[1.75rem] border border-white/70 bg-white p-6 shadow-[0_28px_90px_rgba(15,23,42,0.18)] sm:p-8"
      role="dialog"
      aria-modal="true"
    >
      <button
        type="button"
        class="absolute right-5 top-5 grid h-9 w-9 place-items-center rounded-full text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
        aria-label="Close dialog"
        (click)="closed.emit()"
      >
        <app-icon name="x" [size]="18" />
      </button>

      <div>
        <h3 class="text-2xl font-semibold text-slate-900">Remove profiles from this browser</h3>
        <p class="mt-2 text-sm leading-6 text-slate-500">
          Remove saved profiles from this browser. This will not delete the account.
        </p>
      </div>

      <div class="mt-6 space-y-3">
        @for (profile of profiles(); track profile.id) {
          <div class="flex items-center gap-4 rounded-2xl border border-slate-200 px-4 py-4">
            <app-avatar [name]="profile.name" [avatarUrl]="profile.avatarUrl" size="lg" />

            <div class="min-w-0 flex-1">
              <p class="truncate text-base font-semibold text-slate-900">{{ profile.name }}</p>
              <p class="mt-1 text-sm text-slate-500">Lebhas</p>
            </div>

            <button
              type="button"
              class="rounded-full px-4 py-2 text-sm font-semibold text-red-600 transition hover:bg-red-50"
              (click)="removed.emit(profile.id)"
            >
              Remove
            </button>
          </div>
        }
      </div>
    </section>
  </div>
}
