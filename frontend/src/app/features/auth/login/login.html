<section class="relative">
  @if (showProfilePicker()) {
    <app-remembered-profiles
      [profiles]="rememberedProfiles()"
      [loading]="authLoading()"
      (profileSelected)="selectRememberedProfile($event)"
      (useAnotherProfile)="openManualLogin()"
      (manageProfiles)="openManageProfiles()"
    />
  } @else {
    <div class="space-y-4">
      @if (rememberedProfiles().length > 0) {
        <button
          type="button"
          class="inline-flex items-center gap-2 text-sm font-medium text-slate-600 transition hover:text-slate-900"
          (click)="returnToSavedProfiles()"
        >
          Back to saved profiles
        </button>
      }

      <app-login-form
        [loading]="authLoading()"
        [errorMessage]="loginFormError()"
        [fieldErrors]="loginFieldErrors()"
        (submitted)="submitLoginForm($event)"
        (forgotPassword)="showForgotPasswordHelp()"
      />
    </div>
  }

  <app-remembered-password-dialog
    [open]="!!selectedProfile()"
    [profile]="selectedProfile()"
    [loading]="authLoading()"
    [errorMessage]="rememberedPasswordError()"
    (closed)="closeRememberedProfileDialog()"
    (forgotPassword)="showForgotPasswordHelp()"
    (submitted)="submitRememberedProfilePassword($event)"
  />

  <app-remove-profiles-dialog
    [open]="manageProfilesOpen()"
    [profiles]="rememberedProfiles()"
    (closed)="closeManageProfiles()"
    (removed)="removeRememberedProfile($event)"
  />
</section>
