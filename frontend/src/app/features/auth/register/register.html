
    <app-auth-card>
      <app-auth-header
        badgeLabel="Workspace setup"
        badgeTone="blue"
        title="Create your admin account"
        description="Start a workspace for your business or agency team with a clean multi-tenant foundation."
        icon="building-2"
      />

      @if (auth.authError()) {
        <div class="mb-4 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
          {{ auth.authError() }}
        </div>
      }

      <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
        <div class="grid gap-4 sm:grid-cols-2">
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-ink">First name</span>
            <input
              appAutofocus
              type="text"
              formControlName="firstName"
              autocomplete="given-name"
              placeholder="Rezaur"
              class="h-11 w-full rounded-md border border-border bg-white px-3 text-sm text-ink shadow-sm outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
            />
            @if (fieldError('firstName')) {
              <span class="mt-2 block text-sm text-alert-600">{{ fieldError('firstName') }}</span>
            }
          </label>

          <label class="block">
            <span class="mb-2 block text-sm font-medium text-ink">Last name</span>
            <input
              type="text"
              formControlName="lastName"
              autocomplete="family-name"
              placeholder="Rasul"
              class="h-11 w-full rounded-md border border-border bg-white px-3 text-sm text-ink shadow-sm outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
            />
            @if (fieldError('lastName')) {
              <span class="mt-2 block text-sm text-alert-600">{{ fieldError('lastName') }}</span>
            }
          </label>
        </div>

        <label class="block">
          <span class="mb-2 block text-sm font-medium text-ink">Email</span>
          <input
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="owner@company.com"
            class="h-11 w-full rounded-md border border-border bg-white px-3 text-sm text-ink shadow-sm outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
          />
          @if (fieldError('email')) {
            <span class="mt-2 block text-sm text-alert-600">{{ fieldError('email') }}</span>
          }
        </label>

        <label class="block">
          <span class="mb-2 block text-sm font-medium text-ink">Phone</span>
          <input
            type="tel"
            formControlName="phone"
            autocomplete="tel"
            placeholder="+8801XXXXXXXXX"
            class="h-11 w-full rounded-md border border-border bg-white px-3 text-sm text-ink shadow-sm outline-none transition placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-100"
          />
          @if (fieldError('phone')) {
            <span class="mt-2 block text-sm text-alert-600">{{ fieldError('phone') }}</span>
          }
        </label>

        <app-password-field
          label="Password"
          autocomplete="new-password"
          placeholder="Create a strong password"
          [control]="form.controls.password"
          [submitted]="submitted()"
          [externalError]="fieldError('password')"
        />

        <app-password-field
          label="Confirm password"
          autocomplete="new-password"
          placeholder="Repeat the password"
          [control]="form.controls.confirmPassword"
          [submitted]="submitted()"
          [externalError]="confirmPasswordError()"
        />

        <div class="pt-2">
          <app-button
            type="submit"
            icon="user-plus"
            [fullWidth]="true"
            [loading]="auth.authLoading()"
          >
            Create workspace
          </app-button>
        </div>
      </form>

      <p class="mt-6 text-center text-sm text-muted">
        Already registered?
        <a routerLink="/login" class="font-medium text-brand-700 hover:text-brand-600">Sign in</a>
      </p>
    </app-auth-card>
