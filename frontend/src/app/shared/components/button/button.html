
    <button [type]="type()" [disabled]="disabled() || loading()" [class]="classes()">
      @if (loading()) {
        <app-spinner size="sm" />
      } @else if (icon()) {
        <app-icon [name]="icon()!" [size]="iconSize()" />
      }

      <span class="min-w-0 truncate"><ng-content /></span>
    </button>
